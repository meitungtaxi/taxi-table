<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>的士車行更表生成器 (香港全假期精準版)</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: Arial, sans-serif; padding: 15px; font-weight: bold; color: #000; }
        
        /* 專門為手機優化的輸入面板 */
        .input-panel { background: #f5f5f5; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #ddd; }
        .input-group { display: inline-block; margin-right: 15px; margin-bottom: 12px; }
        .input-group label { font-weight: bold; display: block; margin-bottom: 5px; font-size: 15px; }
        
        /* 放大手機點擊區域 */
        select, input { padding: 12px 10px; font-size: 16px; font-weight: bold; border: 2px solid #bbb; border-radius: 6px; width: 100%; min-width: 140px; background-color: #fff; }
        select { -webkit-appearance: select; cursor: pointer; }
        .inline-inputs .input-group { width: 45%; display: inline-block; }
        
        .button-group { margin-top: 10px; }
        button { padding: 12px 20px; font-size: 16px; font-weight: bold; color: white; border: none; cursor: pointer; border-radius: 5px; margin-right: 10px; margin-bottom: 10px; }
        .btn-blue { background: #007bff; }
        .btn-green { background: #28a745; }
        
        /* 表格範圍 */
        .print-area { width: 100%; max-width: 680px; margin: 0 auto; overflow-x: auto; }
        .header-title { font-size: 28px; font-weight: bold; text-decoration: underline; margin-bottom: 15px; text-align: center; }
        
        /* 表格樣式 - 固定布局確保等寬 */
        table { width: 100%; border-collapse: collapse; text-align: center; font-weight: bold; min-width: 600px; table-layout: fixed; }
        th, td { border: 1.5px solid #000; font-size: 14px; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        th { background-color: #f2f2f2; padding: 8px 4px; font-size: 15px; }
        
        td { height: 28px; }
        
        /* 紅日與星期日的美化樣式 */
        .holiday { color: #d9534f; background-color: #fff9f9; }
        
        @page {
            size: A4;
            margin: 10mm 12mm;
        }
        @media print {
            .input-panel { display: none; }
            body { padding: 0; background-color: #fff; }
            td { height: 26px; }
            .print-area { overflow-x: visible; }
            .holiday { color: #000; background-color: #fff; } /* 列印時保持高對比度純黑白 */
        }
        @media print {
            body {
                transform: scale(0.95);
                transform-origin: top center;
            }
        }
        @media print {
            @page {
                margin: 5mm;
            }
        }
    </style>
</head>
<body>

    <div class="input-panel">
        <h3 style="margin-top:0; color:#333;">🚕 的士更表資料輸入 (香港全假期精準版)</h3>
        
        <div class="input-group" style="width: 100%;">
            <label>的士款式：</label>
            <select id="taxiType" onchange="updateDefaultPrices()">
                <option value="小露寶">小露寶 (混能的士)</option>
                <option value="舊四">舊四 (金豐的士)</option>
            </select>
        </div>
        
        <div class="input-group">
            <label>車牌：</label>
            <input type="text" id="carNo" value="AB 1234">
        </div>
        
        <div class="inline-inputs">
            <div class="input-group">
                <label>年份：</label>
                <input type="number" id="year" value="2026">
            </div>
            <div class="input-group">
                <label>月份：</label>
                <input type="number" id="month" value="6" min="1" max="12">
            </div>
        </div>
        
        <div class="inline-inputs">
            <div class="input-group">
                <label>早更租金：</label>
                <input type="number" id="dayPrice" value="560">
            </div>
            <div class="input-group">
                <label>夜更租金：</label>
                <input type="number" id="nightPrice" value="510">
            </div>
        </div>

        <div class="input-group" style="width: 100%;">
            <label>紅日 / 星期日減收金額 ($)：</label>
            <input type="number" id="discountPrice" value="50">
        </div>
        
        <div class="button-group">
            <button class="btn-blue" onclick="generateTable()">生成簽收表</button>
            <button class="btn-green" onclick="window.print()">列印 / 儲存 PDF</button>
        </div>
    </div>

    <div class="print-area" id="printArea"></div>

    <script>
        function updateDefaultPrices() {
            const taxiType = document.getElementById('taxiType').value;
            if (taxiType === '小露寶') {
                document.getElementById('dayPrice').value = 560;
                document.getElementById('nightPrice').value = 510;
            } else if (taxiType === '舊四') {
                document.getElementById('dayPrice').value = 480;  
                document.getElementById('nightPrice').value = 430; 
            }
            generateTable(); 
        }

        // 內置香港公眾假期數據庫 (包含 2026 年完整公眾假期)
        function isHKPublicHoliday(year, month, day) {
            const dateStr = `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
            
            // 2026年香港公眾假期清單 (特區政府發佈)
            const holidays2026 = [
                "2026-01-01", // 元旦
                "2026-02-17", "2026-02-18", "2026-02-19", // 農曆新年
                "2026-04-03", "2026-04-04", "2026-04-06", // 耶穌受難、清明節、復活節
                "2026-05-01", // 勞動節
                "2026-05-22", // 佛誕
                "2026-06-19", // 端午節
                "2026-07-01", // 特區紀念日
                "2026-09-26", // 中秋節翌日
                "2026-10-01", // 國慶
                "2026-10-19", // 重陽節
                "2026-12-25", "2026-12-26" // 聖誕節及節禮日
            ];

            // 考慮到車行老細可能未來幾年也會用，這裡留存常用的固定西曆紅日作為防呆備用
            if (holidays2026.includes(dateStr)) return true;
            if (month === 1 && day === 1) return true;
            if (month === 5 && day === 1) return true;
            if (month === 7 && day === 1) return true;
            if (month === 10 && day === 1) return true;
            if (month === 12 && (day === 25 || day === 26)) return true;

            return false;
        }

        function generateTable() {
            const carNo = document.getElementById('carNo').value;
            const year = parseInt(document.getElementById('year').value);
            const month = parseInt(document.getElementById('month').value);
            const baseDayPrice = parseInt(document.getElementById('dayPrice').value) || 0;
            const baseNightPrice = parseInt(document.getElementById('nightPrice').value) || 0;
            const discount = parseInt(document.getElementById('discountPrice').value) || 0;

            const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
            const daysInMonth = new Date(year, month, 0).getDate();

            let html = `<div class="header-title">的士更表 (${carNo})</div>`;
            
            html += `<table>
                <thead>
                    <tr>
                        <th style="width: 16%;">日期</th>
                        <th style="width: 10%;">星期</th>
                        <th style="width: 14%;">早更</th>
                        <th style="width: 11%;">金額</th>
                        <th style="width: 17%;">簽署</th>
                        <th style="width: 14%;">夜更</th>
                        <th style="width: 11%;">金額</th>
                        <th style="width: 17%;">簽署</th>
                    </tr>
                </thead>
                <tbody>`;

            for (let d = 1; d <= daysInMonth; d++) {
                let dateStr = `${d < 10 ? '0' + d : d}/${month < 10 ? '0' + month : month}/${year}`;
                const dateObj = new Date(year, month - 1, d);
                let dayIdx = dateObj.getDay();
                let dayOfWeek = weekdays[dayIdx];
                
                // 判斷是否為星期日或香港真正的公眾假期
                let isSun = (dayIdx === 0);
                let isPubHoliday = isHKPublicHoliday(year, month, d);
                let isRedDay = isSun || isPubHoliday;

                // 計算當天實際租金
                let currentDayPrice = isRedDay ? (baseDayPrice - discount) : baseDayPrice;
                let currentNightPrice = isRedDay ? (baseNightPrice - discount) : baseNightPrice;

                let rowClass = isRedDay ? 'class="holiday"' : '';
                
                html += `<tr ${rowClass}>
                    <td>${dateStr}</td>
                    <td>${dayOfWeek}</td>
                    <td>&nbsp;</td>
                    <td>${currentDayPrice}</td>
                    <td>&nbsp;</td>
                    <td>&nbsp;</td>
                    <td>${currentNightPrice}</td>
                    <td>&nbsp;</td>
                </tr>`;
            }

            html += `</tbody></table>`;
            document.getElementById('printArea').innerHTML = html;
        }
        
        window.onload = generateTable;
    </script>

</body>
</html>
